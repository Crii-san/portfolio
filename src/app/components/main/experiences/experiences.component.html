<h2>Expériences</h2>

<div class="experiences-container">
    <div class="experience" *ngFor="let experience of experiences" > 
        <a [href]="experience.site">
            <p class="header-experience">{{ experience.entreprise }} </p>
            <p>{{ experience.poste }}</p>
            <p>{{ experience.taches}}</p>
            <p>{{ experience.dates }} | {{ experience.lieu }}</p>
        </a>
    </div>
</div>
